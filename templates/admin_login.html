{% extends "base.html" %}

{% block title %}Admin Login | Book Recommendation System{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <div class="auth-card mx-auto">
            <span class="eyebrow">Secure admin</span>
            <h1 class="h2 fw-bold mt-3">Admin Login</h1>
            <p class="text-muted-soft">Sign in to manage Supabase books and retrain the recommendation model.</p>
            <form method="post" class="mt-4">
                <div class="mb-3">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-control form-control-lg" id="username" name="username" type="text" autocomplete="username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control form-control-lg" id="password" name="password" type="password" autocomplete="current-password" required>
                </div>
                <button class="btn btn-accent btn-lg w-100 loading-button" type="submit">
                    <span class="button-text">Login</span>
                    <span class="spinner-border spinner-border-sm d-none" aria-hidden="true"></span>
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
